<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrapped with Love</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            justify-content: flex-start;
            padding-top: 1rem;
            padding-bottom: 2rem;
            overflow-x: hidden;
        }

        .title-text {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: #8a2323;
            text-align: center;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeIn 1.5s ease forwards;
        }

        .svg-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: block;
            opacity: 0;
            animation: fadeIn 2s ease forwards 0.5s;
        }

        .svg-text {
            font-family: 'Inter', sans-serif;
            font-size: 46px;
            color: var(--text-brown);
            text-align: center;
            background: rgba(250, 243, 233, 0.85);
            border: 4px solid rgba(138, 35, 35, 0.2);
            border-radius: 40px;
            padding: 20px 40px;
            
            /* EXPLICIT ABSOLUTE SIZE TO FIX IOS SAFARI BUG */
            width: 550px;
            height: 350px;
            margin: 0;
            
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(74, 53, 37, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            line-height: 1.6;
            opacity: 0; /* Hidden initially */
        }

        .connection-dot {
            fill: #8a2323;
            opacity: 0; /* Hidden initially */
        }

        .arrow-path {
            stroke: #8a2323;
            stroke-width: 8;
            fill: none;
            stroke-linecap: round;
            /* Path animation logic */
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
        }

        /* Sequential Arrow Drawing */
        .a1 { animation: drawLine 1s ease forwards 1.0s; }
        .a2 { animation: drawLine 1s ease forwards 1.5s; }
        .a3 { animation: drawLine 1s ease forwards 2.0s; }
        .a4 { animation: drawLine 1s ease forwards 2.5s; }
        .a5 { animation: drawLine 1s ease forwards 3.0s; }
        .a6 { animation: drawLine 1s ease forwards 3.5s; }
        .a7 { animation: drawLine 1s ease forwards 4.0s; }
        .a8 { animation: drawLine 1s ease forwards 4.5s; }

        @keyframes drawLine {
            to { stroke-dashoffset: 0; }
        }

        /* Sequential Text Box Fade In (synced EXACTLY to arrows finishing) */
        .t1 { animation: fadeIn 0.8s ease forwards 2.0s; } /* a1 finishes at 2.0s */
        .t2 { animation: fadeIn 0.8s ease forwards 2.5s; } /* a2 finishes at 2.5s */
        .t3 { animation: fadeIn 0.8s ease forwards 3.0s; }
        .t4 { animation: fadeIn 0.8s ease forwards 3.5s; }
        .t5 { animation: fadeIn 0.8s ease forwards 4.0s; }
        .t6 { animation: fadeIn 0.8s ease forwards 4.5s; }
        .t7 { animation: fadeIn 0.8s ease forwards 5.0s; }
        .t8 { animation: fadeIn 0.8s ease forwards 5.5s; }

        .back-btn-container {
            text-align: center;
            margin-top: 4rem;
            opacity: 0;
            animation: fadeIn 1.5s ease forwards 6.5s;
        }

        @media (max-width: 500px) {
            .title-text { font-size: 2.8rem; margin-bottom: 2rem; }
        }
    </style>
</head>
<body>
    <h1 class="title-text">Wrapped with Love</h1>

    <!-- Interactive SVG Mind Map -->
    <svg class="svg-container" viewBox="0 0 2000 2400" preserveAspectRatio="xMidYMid meet">
        
        <!-- Central Bouquet Image -->
        <image href="assets/bouquet.png" x="750" y="900" width="500" height="600" style="opacity: 0.95;" />

        <!-- 1. Top-Left -->
        <path class="arrow-path a1" pathLength="100" d="M900,1000 Q700,600 500,450" />
        <circle class="connection-dot t1" cx="500" cy="450" r="14" />
        <foreignObject x="100" y="100" width="550" height="350">
            <div xmlns="http://www.w3.org/1999/xhtml" class="svg-text t1">A bouquet of love, sent across the miles...</div>
        </foreignObject>

        <!-- 2. Top -->
        <path class="arrow-path a2" pathLength="100" d="M1000,950 Q1000,700 1000,400" />
        <circle class="connection-dot t2" cx="1000" cy="400" r="14" />
        <foreignObject x="725" y="50" width="550" height="350">
            <div xmlns="http://www.w3.org/1999/xhtml" class="svg-text t2">No expectations, no demands... just pure love from my heart to yours.</div>
        </foreignObject>

        <!-- 3. Top-Right -->
        <path class="arrow-path a3" pathLength="100" d="M1100,1000 Q1300,600 1500,450" />
        <circle class="connection-dot t3" cx="1500" cy="450" r="14" />
        <foreignObject x="1350" y="100" width="550" height="350">
            <div xmlns="http://www.w3.org/1999/xhtml" class="svg-text t3">Every flower represents a silent prayer I make for your happiness.</div>
        </foreignObject>

        <!-- 4. Mid-Left -->
        <path class="arrow-path a4" pathLength="100" d="M800,1150 Q700,1000 600,975" />
        <circle class="connection-dot t4" cx="600" cy="975" r="14" />
        <foreignObject x="50" y="800" width="550" height="350">
            <div xmlns="http://www.w3.org/1999/xhtml" class="svg-text t4">Two years of loving you quietly, deeply, and unconditionally.</div>
        </foreignObject>

        <!-- 5. Mid-Right -->
        <path class="arrow-path a5" pathLength="100" d="M1200,1150 Q1300,1000 1400,975" />
        <circle class="connection-dot t5" cx="1400" cy="975" r="14" />
        <foreignObject x="1400" y="800" width="550" height="350">
            <div xmlns="http://www.w3.org/1999/xhtml" class="svg-text t5">Even under a different sky, my heart beats only for you.</div>
        </foreignObject>

        <!-- 6. Bottom-Left -->
        <path class="arrow-path a6" pathLength="100" d="M850,1350 Q600,1450 500,1600" />
        <circle class="connection-dot t6" cx="500" cy="1600" r="14" />
        <foreignObject x="100" y="1600" width="550" height="350">
            <div xmlns="http://www.w3.org/1999/xhtml" class="svg-text t6">Your smile is my favorite view, even from a distance.</div>
        </foreignObject>

        <!-- 7. Bottom-Center -->
        <path class="arrow-path a7" pathLength="100" d="M1000,1450 Q1000,1700 1000,1950" />
        <circle class="connection-dot t7" cx="1000" cy="1950" r="14" />
        <foreignObject x="725" y="1950" width="550" height="350">
            <div xmlns="http://www.w3.org/1999/xhtml" class="svg-text t7">Far apart in distance, but always close in my thoughts.</div>
        </foreignObject>

        <!-- 8. Bottom-Right -->
        <path class="arrow-path a8" pathLength="100" d="M1150,1350 Q1400,1450 1500,1600" />
        <circle class="connection-dot t8" cx="1500" cy="1600" r="14" />
        <foreignObject x="1350" y="1600" width="550" height="350">
            <div xmlns="http://www.w3.org/1999/xhtml" class="svg-text t8">Loving you from afar is my heart’s most beautiful secret.</div>
        </foreignObject>

    </svg>

    <div class="back-btn-container">
        <button class="btn btn-yes" onclick="window.location.href='yes.html'">Go Back</button>
    </div>

</body>
</html>
