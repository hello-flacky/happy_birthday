<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wrapped with Love</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎉</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            justify-content: flex-start;
            padding-top: 1rem;
            padding-bottom: 2rem;
            overflow-x: hidden;
        }

        .title-text {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: #8a2323;
            text-align: center;
            margin-bottom: 3rem;
            opacity: 0;
            -webkit-animation: fadeIn 1.5s ease forwards;
            animation: fadeIn 1.5s ease forwards;
        }

        .svg-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: block;
            opacity: 0;
            -webkit-animation: fadeIn 2s ease forwards 0.5s;
            animation: fadeIn 2s ease forwards 0.5s;
        }

        .svg-card {
            fill: #faf3e9;
            fill-opacity: 0.86;
            stroke: rgba(138, 35, 35, 0.2);
            stroke-width: 4;
            filter: url(#cardShadow);
        }

        .svg-card-text {
            font-family: 'Inter', sans-serif;
            font-size: 46px;
            fill: var(--text-brown);
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .fade-group {
            opacity: 0;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
        }

        .connection-dot {
            fill: #8a2323;
        }

        .arrow-path {
            stroke: #8a2323;
            stroke-width: 8;
            fill: none;
            stroke-linecap: round;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
        }

        /* Sequential Arrow Drawing */
        .a1 { -webkit-animation: drawLine 1s ease forwards 1.0s; animation: drawLine 1s ease forwards 1.0s; }
        .a2 { -webkit-animation: drawLine 1s ease forwards 1.5s; animation: drawLine 1s ease forwards 1.5s; }
        .a3 { -webkit-animation: drawLine 1s ease forwards 2.0s; animation: drawLine 1s ease forwards 2.0s; }
        .a4 { -webkit-animation: drawLine 1s ease forwards 2.5s; animation: drawLine 1s ease forwards 2.5s; }
        .a5 { -webkit-animation: drawLine 1s ease forwards 3.0s; animation: drawLine 1s ease forwards 3.0s; }
        .a6 { -webkit-animation: drawLine 1s ease forwards 3.5s; animation: drawLine 1s ease forwards 3.5s; }
        .a7 { -webkit-animation: drawLine 1s ease forwards 4.0s; animation: drawLine 1s ease forwards 4.0s; }
        .a8 { -webkit-animation: drawLine 1s ease forwards 4.5s; animation: drawLine 1s ease forwards 4.5s; }

        @-webkit-keyframes drawLine {
            0% { stroke-dashoffset: 100; }
            100% { stroke-dashoffset: 0; }
        }

        @keyframes drawLine {
            0% { stroke-dashoffset: 100; }
            100% { stroke-dashoffset: 0; }
        }

        /* Sequential Text Box Fade In (synced EXACTLY to arrows finishing) */
        .t1 { -webkit-animation: fadeIn 0.8s ease forwards 2.0s; animation: fadeIn 0.8s ease forwards 2.0s; } /* a1 finishes at 2.0s */
        .t2 { -webkit-animation: fadeIn 0.8s ease forwards 2.5s; animation: fadeIn 0.8s ease forwards 2.5s; } /* a2 finishes at 2.5s */
        .t3 { -webkit-animation: fadeIn 0.8s ease forwards 3.0s; animation: fadeIn 0.8s ease forwards 3.0s; }
        .t4 { -webkit-animation: fadeIn 0.8s ease forwards 3.5s; animation: fadeIn 0.8s ease forwards 3.5s; }
        .t5 { -webkit-animation: fadeIn 0.8s ease forwards 4.0s; animation: fadeIn 0.8s ease forwards 4.0s; }
        .t6 { -webkit-animation: fadeIn 0.8s ease forwards 4.5s; animation: fadeIn 0.8s ease forwards 4.5s; }
        .t7 { -webkit-animation: fadeIn 0.8s ease forwards 5.0s; animation: fadeIn 0.8s ease forwards 5.0s; }
        .t8 { -webkit-animation: fadeIn 0.8s ease forwards 5.5s; animation: fadeIn 0.8s ease forwards 5.5s; }

        .back-btn-container {
            text-align: center;
            margin-top: 4rem;
            opacity: 0;
            -webkit-animation: fadeIn 1.5s ease forwards 6.5s;
            animation: fadeIn 1.5s ease forwards 6.5s;
        }

        @media (max-width: 500px) {
            .title-text { font-size: 2.8rem; margin-bottom: 2rem; }
        }
    </style>
</head>
<body>
    <h1 class="title-text">Wrapped with Love</h1>

    <!-- Interactive SVG Mind Map -->
    <svg class="svg-container" viewBox="0 0 2000 2400" preserveAspectRatio="xMidYMid meet">
        <defs>
            <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
                <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#4A3525" flood-opacity="0.12" />
            </filter>
        </defs>
        
        <!-- Central Bouquet Image -->
        <image href="assets/bouquet.png" x="750" y="900" width="500" height="600" style="opacity: 0.95;" />

        <!-- 1. Top-Left -->
        <path class="arrow-path a1" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" d="M900,1000 Q700,600 500,450" />
        <g class="t1 fade-group">
            <circle class="connection-dot" cx="500" cy="450" r="14" />
            <rect class="svg-card" x="100" y="100" width="550" height="350" rx="40" />
            <text class="svg-card-text" x="375" y="275">
                <tspan x="375" dy="-1.2em">A bouquet of love,</tspan>
                <tspan x="375" dy="1.6em">sent across</tspan>
                <tspan x="375" dy="1.6em">the miles...</tspan>
            </text>
        </g>

        <!-- 2. Top -->
        <path class="arrow-path a2" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" d="M1000,950 Q1000,700 1000,400" />
        <g class="t2 fade-group">
            <circle class="connection-dot" cx="1000" cy="400" r="14" />
            <rect class="svg-card" x="725" y="50" width="550" height="350" rx="40" />
            <text class="svg-card-text" x="1000" y="225">
                <tspan x="1000" dy="-1.8em">No expectations,</tspan>
                <tspan x="1000" dy="1.6em">no demands...</tspan>
                <tspan x="1000" dy="1.6em">just pure love from</tspan>
                <tspan x="1000" dy="1.6em">my heart to yours.</tspan>
            </text>
        </g>

        <!-- 3. Top-Right -->
        <path class="arrow-path a3" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" d="M1100,1000 Q1300,600 1500,450" />
        <g class="t3 fade-group">
            <circle class="connection-dot" cx="1500" cy="450" r="14" />
            <rect class="svg-card" x="1350" y="100" width="550" height="350" rx="40" />
            <text class="svg-card-text" x="1625" y="275">
                <tspan x="1625" dy="-1.8em">Every flower</tspan>
                <tspan x="1625" dy="1.6em">represents a silent</tspan>
                <tspan x="1625" dy="1.6em">prayer I make for</tspan>
                <tspan x="1625" dy="1.6em">your happiness.</tspan>
            </text>
        </g>

        <!-- 4. Mid-Left -->
        <path class="arrow-path a4" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" d="M800,1150 Q700,1000 600,975" />
        <g class="t4 fade-group">
            <circle class="connection-dot" cx="600" cy="975" r="14" />
            <rect class="svg-card" x="50" y="800" width="550" height="350" rx="40" />
            <text class="svg-card-text" x="325" y="975">
                <tspan x="325" dy="-1.8em">Two years of loving</tspan>
                <tspan x="325" dy="1.6em">you quietly, deeply,</tspan>
                <tspan x="325" dy="1.6em">and</tspan>
                <tspan x="325" dy="1.6em">unconditionally.</tspan>
            </text>
        </g>

        <!-- 5. Mid-Right -->
        <path class="arrow-path a5" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" d="M1200,1150 Q1300,1000 1400,975" />
        <g class="t5 fade-group">
            <circle class="connection-dot" cx="1400" cy="975" r="14" />
            <rect class="svg-card" x="1400" y="800" width="550" height="350" rx="40" />
            <text class="svg-card-text" x="1675" y="975">
                <tspan x="1675" dy="-1.2em">Even under a</tspan>
                <tspan x="1675" dy="1.6em">different sky,</tspan>
                <tspan x="1675" dy="1.6em">my heart beats</tspan>
                <tspan x="1675" dy="1.6em">only for you.</tspan>
            </text>
        </g>

        <!-- 6. Bottom-Left -->
        <path class="arrow-path a6" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" d="M850,1350 Q600,1450 500,1600" />
        <g class="t6 fade-group">
            <circle class="connection-dot" cx="500" cy="1600" r="14" />
            <rect class="svg-card" x="100" y="1600" width="550" height="350" rx="40" />
            <text class="svg-card-text" x="375" y="1775">
                <tspan x="375" dy="-1.8em">Your smile is</tspan>
                <tspan x="375" dy="1.6em">my favorite view,</tspan>
                <tspan x="375" dy="1.6em">even from a</tspan>
                <tspan x="375" dy="1.6em">distance.</tspan>
            </text>
        </g>

        <!-- 7. Bottom-Center -->
        <path class="arrow-path a7" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" d="M1000,1450 Q1000,1700 1000,1950" />
        <g class="t7 fade-group">
            <circle class="connection-dot" cx="1000" cy="1950" r="14" />
            <rect class="svg-card" x="725" y="1950" width="550" height="350" rx="40" />
            <text class="svg-card-text" x="1000" y="2125">
                <tspan x="1000" dy="-1.8em">Far apart in</tspan>
                <tspan x="1000" dy="1.6em">distance, but always</tspan>
                <tspan x="1000" dy="1.6em">close in my</tspan>
                <tspan x="1000" dy="1.6em">thoughts.</tspan>
            </text>
        </g>

        <!-- 8. Bottom-Right -->
        <path class="arrow-path a8" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" d="M1150,1350 Q1400,1450 1500,1600" />
        <g class="t8 fade-group">
            <circle class="connection-dot" cx="1500" cy="1600" r="14" />
            <rect class="svg-card" x="1350" y="1600" width="550" height="350" rx="40" />
            <text class="svg-card-text" x="1625" y="1775">
                <tspan x="1625" dy="-1.8em">Loving you from</tspan>
                <tspan x="1625" dy="1.6em">afar is my heart’s</tspan>
                <tspan x="1625" dy="1.6em">most beautiful</tspan>
                <tspan x="1625" dy="1.6em">secret.</tspan>
            </text>
        </g>

    </svg>

    <div class="back-btn-container">
        <button class="btn btn-yes" onclick="window.location.href='yes.html'">Go Back</button>
    </div>

</body>
</html>
